name: Apply Amy POI and DOL calibration

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/apply-amy-poi-dol-calibration.yml"
      - ".github/amy-poi-dol-trigger"

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Patch protected Pine working copy
        run: python3 .github/scripts/patch_amy_poi_dol.py

      - name: Commit patched indicator and remove one-time files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-amy-poi-dol-calibration.yml
          git rm .github/scripts/patch_amy_poi_dol.py
          git rm .github/amy-poi-dol-trigger
          git add ICT_yang_di_sempurnakan_dashboard_bottom_left_fixed_BACKTEST_WORKING_COPY.pine
          git commit -m "fix: calibrate POI maturity and add DOL abandoned state"
          git push origin HEAD:main
