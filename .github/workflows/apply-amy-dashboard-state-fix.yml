name: Apply Amy Dashboard state fix

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/apply-amy-dashboard-state-fix.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Patch Pine working copy
        shell: bash
        run: |
          python3 - <<'PY'

          from pathlib import Path
          import base64

          target = Path("ICT_yang_di_sempurnakan_dashboard_bottom_left_fixed_BACKTEST_WORKING_COPY.pine")
          text = target.read_text(encoding="utf-8")

          def replace_once(old, new, label):
              global text
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{label}: expected 1 match, found {count}")
              text = text.replace(old, new, 1)

          def replace_between(start_marker, end_marker, replacement, label):
              global text
              start = text.find(start_marker)
              if start < 0:
                  raise RuntimeError(f"{label}: start marker missing")
              end = text.find(end_marker, start)
              if end < 0:
                  raise RuntimeError(f"{label}: end marker missing")
              text = text[:start] + replacement.rstrip() + "\n\n" + text[end:]

          new_function = base64.b64decode("  LCBfaCkKICAgICAgICBfcmFuZ2VMb3cgOj0gX2xhc3RQTAogICAgICAgIF9iaWFzQ2hhbmdlZCA6PSB0cnVlCgogICAgZWxzZSBpZiBfYmVhck1zcyBhbmQgX2JpYXNEaXIgIT0gLTEKICAgICAgICBfYmlhc0RpciA6PSAtMQogICAgICAgIF9tc3NEaXIgOj0gLTEKICAgICAgICBfbG9ja2VkSW52YWxpZCA6PSBfbGFzdFBI CiAgICAgICAgX3JhbmdlSGlnaCA6PSBfbGFzdFBI CiAgICAgICAgX3JhbmdlTG93IDo9IG1hdGgubWluKF9sYXN0UEwsIF9sKQogICAgICAgIF9iaWFzQ2hhbmdlZCA6PSB0cnVlCgogICAgZWxzZSBpZiBfYnVsbE1zcyBhbmQgX2JpYXNEaXIgPT0gMQogICAgICAgIF9tc3NEaXIgOj0gMQogICAgICAgIF9yYW5nZUhpZ2ggOj0gbmEoX3JhbmdlSGlnaCkgPyBtYXRoLm1heChfbGFzdFBI    ").decode("utf-8")

          replace_once(
              'amyDashV2_sweepFreshBars = input.int(8, "Sweep Fresh Bars", minval=3, maxval=30, group=amyDashV2_group)',
              'amyDashV2_sweepFreshBars = input.int(16, "Sweep Fresh Bars", minval=3, maxval=30, group=amyDashV2_group)',
              "freshBars default",
          )

          replace_between(
              "amyDashV2_engine(_swingLen, _freshBars, _nearAtr, _dispMult, _minSweepTicks) =>",
              "[amyDashV2_o15, amyDashV2_h15",
              new_function,
              "amyDashV2_engine",
          )

          replace_once(
              'amyDashV2_sweepStatusText = amyDashV2_sweepStatus == 1 ? "Fresh" : amyDashV2_sweepStatus == 2 ? "Old" : amyDashV2_sweepStatus == 3 ? "Invalid" : "None"',
              'amyDashV2_sweepStatusText = amyDashV2_sweepStatus == 1 ? "Fresh" : amyDashV2_sweepStatus == 2 ? "Old" : amyDashV2_sweepStatus == 3 ? "Invalid" : amyDashV2_sweepStatus == 4 ? "Expired" : "None"',
              "sweep status text",
          )

          replace_once(
              'amyDashV2_dolStatusText = amyDashV2_dolStatus == 2 ? "Reached" : amyDashV2_dolStatus == 1 ? "Active" : "Neutral"',
              'amyDashV2_dolStatusText = amyDashV2_dolStatus == 1 ? "Active" : amyDashV2_dolStatus == 2 ? "Reached" : amyDashV2_dolStatus == 3 ? "Invalid" : amyDashV2_dolStatus == 4 ? "Expired" : "Neutral"',
              "DOL status text",
          )

          replace_once(
              'amyDashV2_dolBg = amyDashV2_dolDir == 1 ? amyDashV2_buyBg : amyDashV2_dolDir == -1 ? amyDashV2_sellBg : amyDashV2_neutralBg',
              'amyDashV2_dolBg = amyDashV2_dolStatus == 3 ? amyDashV2_sellBg : amyDashV2_dolStatus == 4 ? amyDashV2_neutralBg : amyDashV2_dolStatus == 2 ? amyDashV2_warnBg : amyDashV2_dolDir == 1 ? amyDashV2_buyBg : amyDashV2_dolDir == -1 ? amyDashV2_sellBg : amyDashV2_neutralBg',
              "DOL background",
          )

          replace_once(
              'amyEntryV2_poiReady = amyDashV2_poiPriority >= 1 and amyDashV2_poiAlign == 1 and not na(amyDashV2_poiHigh) and not na(amyDashV2_poiLow)',
              'amyEntryV2_poiReady = amyDashV2_poiPriority >= 1 and amyDashV2_poiAlign == 1 and amyDashV2_poiStatus >= 1 and amyDashV2_poiStatus <= 3 and not na(amyDashV2_poiHigh) and not na(amyDashV2_poiLow)',
              "POI ready state guard",
          )

          old_poi_scoring = '''// --- Layer 3: POI Alignment (max 15 pts) ---
          // POI aligned + correct zone = 15, POI aligned only = 8
          amyEntryV2_bullPoi = amyDashV2_poiPriority >= 1 and amyDashV2_poiAlign == 1 and amyDashV2_biasDir == 1 ?
           (amyDashV2_poiLocation == -1 ? 15 : 8) : 0
          amyEntryV2_bearPoi = amyDashV2_poiPriority >= 1 and amyDashV2_poiAlign == 1 and amyDashV2_biasDir == -1 ?
           (amyDashV2_poiLocation == 1 ? 15 : 8) : 0'''

          new_poi_scoring = '''// --- Layer 3: POI Alignment (max 15 pts) ---
          // New POI states: Fresh receives full weight, Active reduced weight,
          // Mitigated residual weight, Failed/None no score.
          amyEntryV2_bullPoi = amyDashV2_poiPriority >= 1 and amyDashV2_poiAlign == 1 and amyDashV2_biasDir == 1 ?
           (amyDashV2_poiStatus == 1 ? (amyDashV2_poiLocation == -1 ? 15 : 8) :
            amyDashV2_poiStatus == 2 ? (amyDashV2_poiLocation == -1 ? 12 : 6) :
            amyDashV2_poiStatus == 3 ? (amyDashV2_poiLocation == -1 ? 5 : 3) : 0) : 0
          amyEntryV2_bearPoi = amyDashV2_poiPriority >= 1 and amyDashV2_poiAlign == 1 and amyDashV2_biasDir == -1 ?
           (amyDashV2_poiStatus == 1 ? (amyDashV2_poiLocation == 1 ? 15 : 8) :
            amyDashV2_poiStatus == 2 ? (amyDashV2_poiLocation == 1 ? 12 : 6) :
            amyDashV2_poiStatus == 3 ? (amyDashV2_poiLocation == 1 ? 5 : 3) : 0) : 0'''

          replace_once(old_poi_scoring, new_poi_scoring, "POI scoring")

          old_dol_scoring = '''// --- Layer 4: DOL Active (max 10 pts) ---
          amyEntryV2_bullDol = amyDashV2_dolStatus == 1 and amyDashV2_dolDir == 1 ? 10 :
           amyDashV2_dolStatus == 2 and amyDashV2_dolDir == 1 ? 5 : 0
          amyEntryV2_bearDol = amyDashV2_dolStatus == 1 and amyDashV2_dolDir == -1 ? 10 :
           amyDashV2_dolStatus == 2 and amyDashV2_dolDir == -1 ? 5 : 0'''

          new_dol_scoring = '''// --- Layer 4: DOL Active (max 10 pts) ---
          // Only Active(1) contributes directional confluence.
          // Reached/Invalid/Expired are terminal and must not keep adding score.
          amyEntryV2_bullDol = amyDashV2_dolStatus == 1 and amyDashV2_dolDir == 1 ? 10 : 0
          amyEntryV2_bearDol = amyDashV2_dolStatus == 1 and amyDashV2_dolDir == -1 ? 10 : 0'''

          replace_once(old_dol_scoring, new_dol_scoring, "DOL scoring")

          near_dol_line = 'amyEntryV2_nearDol = not na(amyEntryV2_dolDist) and amyEntryV2_dolDist <= amyEntryV2_atr14 * 1.0 and amyDashV2_dolStatus == 1'
          near_dol_new = near_dol_line + '''

          // Terminal DOL states are persistent, so narration must fire only on transition.
          amyEntryV2_dolReachedEvent = amyDashV2_dolStatus == 2 and amyDashV2_dolStatus[1] != 2
          amyEntryV2_dolInvalidEvent = amyDashV2_dolStatus == 3 and amyDashV2_dolStatus[1] != 3
          amyEntryV2_dolExpiredEvent = amyDashV2_dolStatus == 4 and amyDashV2_dolStatus[1] != 4'''
          replace_once(near_dol_line, near_dol_new, "DOL event flags")

          old_narration = '''        // --- DOL reached ---
                  else if amyDashV2_dolStatus == 2
                      _narr := amyEntryV2_addLine(_narr, "🎯 Target " + amyEntryV2_dolName(amyDashV2_dolDir) + " tercapai")
                      _narr := amyEntryV2_addLine(_narr, "Hati-hati reaksi baru, jangan kejar harga")
                      _importance := 2

                  // --- DOL active near target ---'''

          new_narration = '''        // --- DOL terminal events ---
                  else if amyEntryV2_dolInvalidEvent
                      _narr := amyEntryV2_addLine(_narr, "⚠ DOL invalid")
                      _narr := amyEntryV2_addLine(_narr, "Harga close melewati sweep extreme")
                      _importance := 2
                  else if amyEntryV2_dolExpiredEvent
                      _narr := amyEntryV2_addLine(_narr, "⌛ DOL expired")
                      _narr := amyEntryV2_addLine(_narr, "Target tidak tercapai dalam freshness window")
                      _importance := 1
                  else if amyEntryV2_dolReachedEvent
                      _narr := amyEntryV2_addLine(_narr, "🎯 Target " + amyEntryV2_dolName(amyDashV2_dolDir) + " tercapai")
                      _narr := amyEntryV2_addLine(_narr, "Hati-hati reaksi baru, jangan kejar harga")
                      _importance := 2

                  // --- DOL active near target ---'''

          replace_once(old_narration, new_narration, "DOL narration")

          required = [
              "var int _bullFvgCreatedBar = na",
              "var float _dolTargetLocked = na",
              "_bi - _dolStartBar >= _freshBars",
              "_bullFvgMitigated",
              "_bearObMitigated",
              "_dolActiveAligned = _dolState == 1",
              'amyDashV2_dolStatus == 4 ? "Expired"',
              'amyDashV2_sweepStatus == 4 ? "Expired"',
          ]
          for needle in required:
              if needle not in text:
                  raise RuntimeError(f"sanity check missing: {needle}")

          if text.count("amyDashV2_engine(_swingLen, _freshBars, _nearAtr, _dispMult, _minSweepTicks) =>") != 1:
              raise RuntimeError("engine function count is not exactly one")

          if "amyDashV2_sweepFreshBars = input.int(8" in text:
              raise RuntimeError("old freshBars default remains")

          if "amyDashV2_dolStatus == 2 and amyDashV2_dolDir" in text:
              raise RuntimeError("Reached state still contributes DOL score")

          if text.count("[amyDashV2_o15, amyDashV2_h15") != 1:
              raise RuntimeError("request.security unpack missing or duplicated")

          target.write_text(text, encoding="utf-8")
          print("Patched", target)

          PY

      - name: Commit patched working copy and remove temporary workflow
        shell: bash
        run: |
          rm -f .github/workflows/apply-amy-dashboard-state-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ICT_yang_di_sempurnakan_dashboard_bottom_left_fixed_BACKTEST_WORKING_COPY.pine .github/workflows/apply-amy-dashboard-state-fix.yml
          git diff --cached --check
          git commit -m "fix: harden POI and DOL state machines"
          git push origin main
